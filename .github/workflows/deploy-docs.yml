name: Deploy docs

# Deploys the docs site to Cloudflare (Workers static assets, apps/docs/wrangler.jsonc)
# whenever the `docs` tag is pushed or moved:
#   git tag -f docs && git push -f origin docs
# Needs CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets. The token needs the
# "Edit Cloudflare Workers" template permissions (account Workers Scripts:Edit plus
# zone Workers Routes:Edit on brijbyte.com — the custom domain is attached on deploy).

on:
  push:
    tags:
      - "docs"
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: pnpm

      # ~25k Material Symbols SVGs the icons build would otherwise re-download.
      - name: Cache icon downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/icons/.cache
          key: icons-svg-${{ github.run_id }}
          restore-keys: icons-svg-

      - name: Install
        run: pnpm install --frozen-lockfile

      # Next.js incremental build cache for the docs static export.
      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/docs/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/docs/src/**', 'apps/docs/next.config.ts') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      # Library + icons dist, then the static docs export to apps/docs/out/.
      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare
        working-directory: apps/docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
