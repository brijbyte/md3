name: Publish

# Publishes one package when its tag is pushed. Tags are named
# `<pkg-name>@<version>` (e.g. `@brijbyte/md3-react@0.0.1`) — the
# two packages are versioned independently. The tag must match the package's
# package.json version. Publishing uses npm trusted publishing (OIDC, with
# provenance) — no NPM_TOKEN. A version already on npm is skipped, so re-runs
# are safe. Finally a GitHub release is cut for the tag, with the matching
# `## v<version>` section of the package's CHANGELOG.md as its body.
# Tags are cut with `pnpm release <react|icons> <version>` (scripts/release.mjs).

on:
  push:
    tags:
      - "@brijbyte/md3-react@*"
      - "@brijbyte/md3-icons@*"
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub release
  id-token: write # npm provenance

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    environment: npm-publish # scope the trusted publisher (and any approvals) here
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Resolve package and version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="${TAG%@*}"           # @brijbyte/md3-react | @brijbyte/md3-icons
          VERSION="${TAG##*@}"
          case "$NAME" in
            "@brijbyte/md3-react") PKG=react ;;
            "@brijbyte/md3-icons") PKG=icons ;;
            *) echo "::error::Unrecognized tag '$TAG' — expected <pkg-name>@<version>."; exit 1 ;;
          esac
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "dir=packages/$PKG"
            echo "name=$NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Verify package version matches the tag
        run: |
          PKG_VERSION="$(node -p "require('./${{ steps.meta.outputs.dir }}/package.json').version")"
          if [ "$PKG_VERSION" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::${{ steps.meta.outputs.name }} is at $PKG_VERSION but tag is ${{ steps.meta.outputs.tag }}"
            exit 1
          fi

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 26.5.0
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      # Trusted publishing (OIDC) requires npm CLI >= 11.5.1.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # ~25k Material Symbols SVGs the icons build would otherwise re-download.
      - name: Cache icon downloads
        if: startsWith(steps.meta.outputs.tag, '@brijbyte/md3-icons@')
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/icons/.cache
          key: icons-svg-${{ github.run_id }}
          restore-keys: icons-svg-

      - name: Install
        run: pnpm install --frozen-lockfile

      # Only the tagged package — no docs build, no tests (that's CI's job).
      - name: Build
        run: pnpm --filter "${{ steps.meta.outputs.name }}" build

      # Before publishing, so a missing changelog section blocks the release.
      - name: Extract changelog section (fails if missing)
        run: >-
          node scripts/extract-changelog.mjs "${{ steps.meta.outputs.version }}"
          "${{ steps.meta.outputs.dir }}/CHANGELOG.md" > RELEASE_NOTES.md

      # Trusted publishing: npm authenticates via the OIDC token (id-token: write)
      # and mints provenance automatically. Configure this repo + workflow (+ the
      # npm-publish environment) as a trusted publisher on npmjs.com for BOTH
      # packages first. Skips if the version is already on npm.
      - name: Publish to npm (trusted publishing)
        working-directory: ${{ steps.meta.outputs.dir }}
        run: |
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "::notice::${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} already published — skipping."
            exit 0
          fi
          npm publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "::notice::Release ${{ steps.meta.outputs.tag }} already exists — skipping."
            exit 0
          fi
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
