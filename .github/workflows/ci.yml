name: CI

# Runs on every PR: verifies formatting, lint, types, tests, and that the
# packages + docs site build. All checks run even if an earlier one fails
# (`if: always()` per step), so a PR sees every problem at once.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Disable Next.js telemetry for every `next` call in this workflow.
env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: pnpm

      # ~25k Material Symbols SVGs the icons build would otherwise re-download.
      # Per-run key + prefix restore so newly added icons accumulate into the cache.
      - name: Cache icon downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/icons/.cache
          key: icons-svg-${{ github.run_id }}
          restore-keys: icons-svg-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format
        if: always()
        run: pnpm format:check

      - name: Lint
        if: always()
        run: pnpm lint

      # Next.js incremental build cache for the docs static export.
      - name: Cache Next.js build
        if: always()
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/docs/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/docs/src/**', 'apps/docs/next.config.ts') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      # Build before Typecheck: tsc needs the build-time codegen (token typings,
      # *.module.css.d.ts) and the docs app typechecks against the built dist.
      - name: Build
        if: always()
        run: pnpm build

      - name: Typecheck
        if: always()
        run: pnpm typecheck

      # Vitest browser mode drives a real chromium via Playwright. Cache the
      # browser binary (keyed on the Playwright version) — the apt system libs
      # aren't cacheable, so install-deps always runs but the ~130MB browser
      # download is skipped on a cache hit.
      - name: Resolve Playwright version
        if: always()
        id: pw
        run: echo "version=$(grep -m1 -E '^  playwright@' pnpm-lock.yaml | sed -E 's/^  playwright@([0-9.]+):.*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: always()
        id: pw-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright system deps
        if: always()
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright chromium
        if: always() && steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Test
        if: always()
        run: pnpm test

      # Last: dedupe re-resolves and may rewrite node_modules, so keep it after
      # the steps that depend on the installed tree.
      - name: Dedupe
        if: always()
        run: pnpm dedupe --check
