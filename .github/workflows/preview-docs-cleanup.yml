name: Preview docs cleanup

# Deletes the PR's preview worker (md3-docs-pr-<n>) when the PR closes;
# force=true also detaches its preview-<n>.md3.brijbyte.com custom domain.
# The Cloudflare API is used directly — wrangler delete prompts interactively.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          STATUS="$(curl -s -o response.json -w "%{http_code}" -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/md3-docs-pr-$PR?force=true" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")"
          # 404 = preview was never deployed for this PR — nothing to clean.
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "404" ]; then
            cat response.json; exit 1
          fi
          echo "md3-docs-pr-$PR: HTTP $STATUS"
