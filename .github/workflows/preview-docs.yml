name: Preview docs

# Uploads the PR's docs build as a non-production version of the md3-docs
# worker (`wrangler versions upload`) and comments its workers.dev preview
# URL on the PR. Production and md3.brijbyte.com are untouched — only the
# `docs` tag deploys, and versions need no cleanup (they just age out).
# Skipped for fork PRs (no access to the Cloudflare secrets).

on:
  pull_request:

concurrency:
  group: preview-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # preview-URL comment

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.5.0
          cache: pnpm

      # ~25k Material Symbols SVGs the icons build would otherwise re-download.
      - name: Cache icon downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/icons/.cache
          key: icons-svg-${{ github.run_id }}
          restore-keys: icons-svg-

      - name: Install
        run: pnpm install --frozen-lockfile

      # Next.js incremental build cache for the docs static export.
      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/docs/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/docs/src/**', 'apps/docs/next.config.ts') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build

      # The alias gives a stable per-PR URL: pr-<n>-md3-docs.<account>.workers.dev.
      - name: Upload preview version
        id: upload
        working-directory: apps/docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler versions upload \
            --preview-alias "pr-${{ github.event.pull_request.number }}" \
            --message "PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}" \
            | tee upload.log
          URL="$(grep -i 'Preview Alias URL' upload.log | grep -Eo 'https://[a-z0-9.-]+\.workers\.dev' | tail -1)"
          if [ -z "$URL" ]; then
            echo "::error::No preview alias URL in wrangler output."; exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # One sticky comment per PR, updated on every push.
      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          URL: ${{ steps.upload.outputs.url }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- preview-docs -->"
          BODY="$MARKER
          **Docs preview:** $URL (for $SHA)"
          COMMENT_ID="$(gh api "repos/${{ github.repository }}/issues/$PR/comments" \
            --jq "map(select(.body | startswith(\"$MARKER\"))) | .[0].id // empty")"
          if [ -n "$COMMENT_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -f body="$BODY" > /dev/null
          else
            gh api "repos/${{ github.repository }}/issues/$PR/comments" -f body="$BODY" > /dev/null
          fi
