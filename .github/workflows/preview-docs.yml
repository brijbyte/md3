name: Preview docs

# Uploads the PR's docs build as a non-production version of the md3-docs
# worker (`wrangler versions upload`) and surfaces it as a "Docs preview"
# commit status on the PR: while building, its Details link points at this
# run's logs; once uploaded, it flips to the workers.dev preview URL.
# Production and md3.brijbyte.com are untouched — only the `docs` tag
# deploys, and versions need no cleanup (they just age out).
# Skipped for fork PRs (no access to the Cloudflare secrets).

on:
  pull_request:

concurrency:
  group: preview-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write # "Docs preview" check row whose Details link flips to the preview

env:
  NEXT_TELEMETRY_DISABLED: "1"
  WRANGLER_SEND_METRICS: "false"

jobs:
  preview:
    name: Deploy PR preview docs
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      # Netlify-style check row: Details → this run's logs while building,
      # flipped to the preview URL after the upload.
      - name: Set pending status
        id: status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f context="Docs preview" -f state=pending \
            -f description="Building docs preview…" -f target_url="$RUN_URL" > /dev/null
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.5.0
          cache: pnpm

      # ~25k Material Symbols SVGs the icons build would otherwise re-download.
      - name: Cache icon downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/icons/.cache
          key: icons-svg-${{ github.run_id }}
          restore-keys: icons-svg-

      - name: Install
        run: pnpm install --frozen-lockfile

      # Next.js incremental build cache for the docs static export.
      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/docs/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/docs/src/**', 'apps/docs/next.config.ts') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      # Quiet on success: full log only on failure, warning/error lines otherwise.
      - name: Build
        run: |
          pnpm build > build.log 2>&1 || { cat build.log; exit 1; }
          grep -iE '(warn|error)' build.log || true

      # The alias gives a stable per-PR URL: pr-<n>-md3-docs.<account>.workers.dev.
      - name: Upload preview version
        id: upload
        working-directory: apps/docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler versions upload \
            --preview-alias "pr-${{ github.event.pull_request.number }}" \
            --message "PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}" \
            > upload.log 2>&1 || { cat upload.log; exit 1; }
          grep -iE '(warn|error)' upload.log || true
          URL="$(grep -i 'Preview Alias URL' upload.log | grep -Eo 'https://[a-z0-9.-]+\.workers\.dev' | tail -1)"
          if [ -z "$URL" ]; then
            cat upload.log
            echo "::error::No preview alias URL in wrangler output."; exit 1
          fi
          echo "Preview: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # Same check row now resolves to the built preview.
      - name: Mark preview ready
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          URL: ${{ steps.upload.outputs.url }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f context="Docs preview" -f state=success \
            -f description="Deploy preview ready" -f target_url="$URL" > /dev/null

      - name: Mark preview failed
        if: (failure() || cancelled()) && steps.status.outputs.run_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f context="Docs preview" -f state=${{ job.status == 'cancelled' && 'pending' || 'failure' }} \
            -f description="${{ job.status == 'cancelled' && 'Superseded by a newer run' || 'Docs preview build failed' }}" \
            -f target_url="${{ steps.status.outputs.run_url }}" > /dev/null
