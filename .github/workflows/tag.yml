name: Create tag

# Cut release tags straight from the GitHub UI (Actions → Create tag → Run workflow),
# so you don't need a local checkout. After tagging, this dispatches the matching
# downstream workflow directly:
#   - docs tag → deploy-docs.yml (Cloudflare deploy)
#   - @brijbyte/md3-<pkg>@<version> tag → publish.yml (npm publish + release)
# We must dispatch rather than rely on the tag push: a push made with GITHUB_TOKEN
# does NOT trigger other workflows (GitHub's recursion guard), but workflow_dispatch
# is exempt. The `packages` path tags each package at its committed package.json
# version, skipping any whose tag already exists — so it only tags bumped packages.

on:
  workflow_dispatch:
    inputs:
      target:
        description: What to tag
        type: choice
        required: true
        default: both
        options:
          - docs
          - packages
          - both

concurrency:
  group: create-tag
  cancel-in-progress: false

jobs:
  tag:
    name: Create tags and dispatch downstream workflows
    runs-on: ubuntu-latest
    permissions:
      contents: write # push tags
      actions: write # dispatch the downstream deploy/publish workflows
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history + tags so we can move/create tags

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # `docs` is a floating tag — force-move it to this ref, then deploy.
      - name: Tag docs
        if: contains(fromJSON('["docs", "both"]'), github.event.inputs.target)
        run: |
          git tag -f docs
          git push -f origin docs
          gh workflow run deploy-docs.yml --ref docs
          echo "::notice::Moved docs tag — deploy-docs dispatched."

      # Tag each package at its committed version; skip ones already tagged.
      - name: Tag packages
        if: contains(fromJSON('["packages", "both"]'), github.event.inputs.target)
        run: |
          set -euo pipefail
          for PKG_JSON in packages/*/package.json; do
            DIR="$(dirname "$PKG_JSON")"
            NAME="$(node -p "require('./$DIR/package.json').name")"
            VERSION="$(node -p "require('./$DIR/package.json').version")"
            TAG="$NAME@$VERSION"

            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "::notice::$TAG already exists — skipping."
              continue
            fi

            # Fails (non-zero) if the CHANGELOG section is missing or empty.
            node scripts/extract-changelog.mjs "$VERSION" "$DIR/CHANGELOG.md" >/dev/null

            git tag -a "$TAG" -m "$TAG"
            git push origin "$TAG"
            # publish.yml derives the package/version from the tag ref it runs on.
            gh workflow run publish.yml --ref "$TAG"
            echo "::notice::Tagged $TAG — publish dispatched."
          done
