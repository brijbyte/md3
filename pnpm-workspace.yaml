  - "@yuku-parser/binding-linux-arm64-musl@0.6.1"
  - "@yuku-parser/binding-linux-x64-gnu@0.6.1"
  - "@yuku-parser/binding-linux-x64-musl@0.6.1"
  - "@yuku-parser/binding-win32-arm64@0.6.1"
  - "@yuku-parser/binding-win32-x64@0.6.1"
